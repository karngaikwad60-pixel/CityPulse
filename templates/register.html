<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>CityPulse – Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100dvh;
    background:linear-gradient(120deg,#e6f4f1,#f5fbfa);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* Main Card */
.container{
    width:1000px;
    max-width:100%;
    background:#fff;
    display:flex;
    border-radius:18px;
    box-shadow:0 25px 50px rgba(0,0,0,0.12);
    overflow:hidden;
}

/* Image Section */
.image-section{
    width:50%;
    background:radial-gradient(circle at center,#c8f0e7,#9adfd1);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.image-section img{
    width:100%;
    max-width:500px;
    height:auto;
    animation:float 6s ease-in-out infinite;
}

/* Form Section */
.form-section{
    width:50%;
    padding:45px;
}

.form-section h2{
    font-size:26px;
    font-weight:600;
    color:#14532d;
    margin-bottom:20px;
    text-align:center;
}

/* Inputs */
label{
    font-size:14px;
    font-weight:500;
    color:#374151;
    margin-top:14px;
    display:block;
}

input,
select{
    width:100%;
    padding:12px 14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #d1fae5;
    background:#f9fffd;
    font-size:14px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#16a34a;
    box-shadow:0 0 0 2px rgba(22,163,74,0.2);
}

/* Button */
button{
    width:100%;
    margin-top:26px;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#16a34a,#22c55e);
    color:#fff;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(22,163,74,0.35);
}

/* Success Message */
#successMsg{
    display:none;
    background:#dcfce7;
    color:#166534;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    text-align:center;
    font-weight:500;
}

/* Footer */
p{
    margin-top:18px;
    text-align:center;
    font-size:14px;
}

a{
    color:#16a34a;
    text-decoration:none;
    font-weight:500;
}

/* Animation */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

/* RESPONSIVE */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .container{
        width:100%;
        max-width:100%;
        min-height:auto;
        flex-direction:row; /* keep desktop layout */
    }

    .image-section{
        width:45%;
        padding:20px;
    }

    .image-section img{
        width:100%;
        max-width:220px;
    }

    .form-section{
        width:55%;
        padding:20px;
    }

    .form-section h2{
        font-size:20px;
        margin-bottom:15px;
    }

    label{
        font-size:12px;
        margin-top:10px;
    }

    input,
    select{
        padding:9px 12px;
        font-size:12px;
    }

    button{
        padding:10px;
        font-size:13px;
        margin-top:18px;
    }

    p{
        font-size:12px;
    }
}

@media(max-width:480px){

    .container{
        transform:scale(.92);
    }

    .image-section img{
        max-width:180px;
    }

    .form-section{
        padding:15px;
    }
} 
</style>

</head>

<body>

<div class="container">

```
<!-- Image -->
<div class="image-section">
    <img src="/static/uploads/Secure data-bro.png" alt="City Illustration">
</div>

<!-- Form -->
<div class="form-section">
    <h2>Create Account</h2>

    <!-- Success Message -->
    <p id="successMsg">Registration Successful!</p>

    <form method="POST">

        <label>Name</label>
        <input type="text" name="name" required minlength="3">

        <input type="email" name="email" placeholder="Enter Email" required>

        <label>Phone</label>
        <input type="text" name="phone" required pattern="[0-9]{10}">

        <label>Age</label>
        <input type="number" name="age" required min="18" max="100">

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Password</label>
        <input type="password" name="password" required minlength="6">

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required minlength="6">

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>
```

</div>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e){

    let name = form.name.value.trim();
    let email = form.email.value.trim();
    let phone = form.phone.value.trim();
    let age = form.age.value;
    let gender = form.gender.value;
    let password = form.password.value;
    let confirmPassword = form.confirm_password.value;

    if(name.length < 3){
        alert("Name must be at least 3 characters");
        e.preventDefault();
        return;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!email.match(emailPattern)){
        alert("Enter valid email");
        e.preventDefault();
        return;
    }

    if(!/^[0-9]{10}$/.test(phone)){
        alert("Phone must be 10 digits");
        e.preventDefault();
        return;
    }

    if(age < 18 || age > 100){
        alert("Age must be between 18 and 100");
        e.preventDefault();
        return;
    }

    if(gender === ""){
        alert("Select gender");
        e.preventDefault();
        return;
    }

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        e.preventDefault();
        return;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match");
        e.preventDefault();
        return;
    }

    // ✅ IMPORTANT: DO NOTHING HERE
    // Form will now submit to Flask automatically
});
</script>
</body>
</html>
