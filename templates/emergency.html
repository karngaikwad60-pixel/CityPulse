<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Services</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
}
/* MAIN CONTAINER */
.container{
    width:950px;
    max-width:95%;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    box-shadow:0 30px 60px rgba(0,0,0,.35);
    animation:slideUp .8s ease;
}
/* LEFT IMAGE PANEL */
.image-section {
    width: 50%;
    position: relative;
    background: url("/static/uploads/First\ aid\ kit-pana.png");
    background-size: cover;
    background-position: center;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 4px;
}
.image-text{
    position:absolute;
    bottom:30px;
    left:25px;
    color:#fff;
}
.image-text h2{
    font-size:30px;
    font-weight:600;
}
.image-text p{
    margin-top:6px;
    font-size:14px;
    opacity:.9;
}
/* FORM SECTION */
.form-section{
    width:58%;
    padding:40px;
}
.form-section h2{
    font-size:28px;
    font-weight:600;
    color:#7c2d12;
    margin-bottom:20px;
}
label{
    display:block;
    margin-top:14px;
    font-weight:500;
    color:#1f2937;
}
select,input[type="file"],input[type="hidden"],input[type="text"]{
    width:100%;
    padding:11px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #e5e7eb;
    font-size:14px;
}
select:focus,input:focus{
    outline:none;
    border-color:#f97316;
    box-shadow:0 0 0 2px rgba(249,115,22,.25);
}
/* EMERGENCY BUTTON */
button{
    width:100%;
    margin-top:26px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#f97316,#ea580c);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(249,115,22,.55);
}
/* MAP */
#map{
    height:320px;
    margin-top:24px;
    border-radius:14px;
    border:1px solid #fde68a;
}
/* ANIMATION */
@keyframes slideUp{
    from{opacity:0;transform:translateY(25px)}
    to{opacity:1;transform:translateY(0)}
}
/* RESPONSIVE */
@media(max-width:768px){
    .container{flex-direction:column}
    .image-section{width:100%;height:220px}
    .form-section{width:100%;padding:25px}
}
</style>
</head>
<body>

<div class="container">

    <div class="image-section"></div>

    <div class="form-section">
        <h2>Send Emergency</h2>
        <form method="POST" enctype="multipart/form-data">
            <label>Emergency Type</label>
            <select name="emergency_type" required>
                <option value="Medical">Medical</option>
                <option value="Fire">Fire</option>
            </select>

            <label>Enter Location</label>
            <input type="text" name="manual_location" placeholder="Enter location manually (optional)" class="form-control">

            <label>Upload Image</label>
            <input type="file" name="image" accept="image/*">

            <input type="hidden" name="lat" id="lat">
            <input type="hidden" name="lon" id="lon">

            <button type="submit">Send Emergency</button>
        </form>

        <h3 style="margin-top:25px;">Map Preview</h3>
        <div id="map"></div>
    </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map, marker;

function showPosition(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById('lat').value = lat;
    document.getElementById('lon').value = lon;

    if (!map) {
        map = L.map('map').setView([lat, lon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        marker = L.marker([lat, lon]).addTo(map).bindPopup("Emergency Location").openPopup();
    } else {
        marker.setLatLng([lat, lon]);
        map.setView([lat, lon]);
    }
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition, err => alert("Enable GPS & Location"), { enableHighAccuracy:true });
} else { 
    alert("Geolocation not supported"); 
}
</script>

</body>
</html>
