<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Women Safety Alert</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
            background-color: #f9f9f9;
        }
        h2 {
            color: #d32f2f;
        }
        p {
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        #alertBtn {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }
        #alertBtn:hover {
            background-color: #b71c1c;
        }
        #map {
            height: 400px;
            margin-top: 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>🚨 Women Safety Alert</h2>
    <p>Your live location will be sent instantly to Police.</p>

    <button id="alertBtn">🚨 ALERT</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, marker;

        navigator.geolocation.getCurrentPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                map = L.map('map').setView([lat, lon], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19
                }).addTo(map);

                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("📍 You")
                    .openPopup();

                // Store location globally
                window.userLat = lat;
                window.userLon = lon;
            },
            () => alert("Location permission required!")
        );

        document.getElementById("alertBtn").onclick = () => {
            if (!window.userLat || !window.userLon) {
                alert("Getting your location…");
                return;
            }

            fetch("/women_safety", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    lat: window.userLat,
                    lon: window.userLon
                })
            })
            .then(r => r.text())
            .then(() => {
                alert("🚔 Police alerted!");
                window.location.href = "/dashboard";
            });
        };
    </script>

</body>
</html>
