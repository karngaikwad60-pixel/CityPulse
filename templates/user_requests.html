<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>My Requests</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
:root {
  --bg: linear-gradient(135deg, #ffffff, #ffffff);
  --card-bg: #ffffff;
  --primary: #4f46e5;
  --text-main: #1f2937;
  --text-muted: #6b7280;
  --radius: 16px;
  --shadow: 0 10px 25px rgba(0,0,0,0.1);
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  padding: 30px 15px;
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h2 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 20px;
}

/* CARD */
.request-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: .3s;
}

.request-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 35px rgba(0,0,0,.15);
}

/* HEADER */
.request-header {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title strong { font-size: 1rem; }
.id { font-size: 0.75rem; color: var(--primary); }

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
}
.status.resolved { background:#dcfce7;color:#166534; }
.status.in_progress { background:#fef3c7;color:#92400e; }
.status.pending { background:#fee2e2;color:#991b1b; }

/* TOGGLE BUTTON */
.toggle-btn{
  margin-top:5px;
  padding:4px 8px;
  font-size:.7rem;
  border:none;
  background:#111827;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}
.toggle-btn:hover{ background:#000; }

/* INFO */
.info {
  padding: 8px 16px;
  font-size: 0.85rem;
}

/* CHAT */
.chat-area{
  display:none; /* hidden by default */
}

.chat-box {
  height: 160px;
  overflow-y: auto;
  padding: 8px;
  background: #ffffff;
  border-top: 1px solid #eee;
}

.message {
  margin-bottom: 6px;
  font-size: 0.8rem;
}

.message.user { text-align: right; color: #4f46e5; }
.message.admin { text-align: left; color: #111; }

.timestamp {
  font-size: 0.6rem;
  color: gray;
}

/* INPUT */
.chat-input-area {
  display: flex;
  gap: 5px;
  padding: 8px;
  border-top: 1px solid #eee;
}

.chat-input {
  flex: 1;
  padding: 6px;
  font-size: 0.85rem;
}

.send-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.8rem;
}
</style>
</head>

<body>

<h2>My Requests</h2>

{% for r in requests %}
<div class="request-card" 
     data-id="{{ r.id }}" 
     data-type="{{ r.category }}">

  <div class="request-header">
    
    <div>
      <strong>{{ r.issue_type or r.emergency_type }}</strong><br>
      <span class="id">#{{ r.id }}</span>
    </div>

    <div>
      <div class="status 
        {% if r.status=='RESOLVED' %}resolved
        {% elif r.status=='IN_PROGRESS' %}in_progress
        {% else %}pending{% endif %}">
        {{ r.status }}
      </div>

      <!-- TOGGLE BUTTON -->
      <button class="toggle-btn" onclick="toggleChat({{ r.id }})">
        Show Chat
      </button>
    </div>

  </div>

  <div style="padding:10px;">
    Category: <b>{{ r.category }}</b>
  </div>

  <!-- TOGGLE CHAT AREA -->
  <div id="chat-area-{{ r.id }}" class="chat-area">

    <div class="chat-box" id="chat-{{ r.id }}"></div>

    <div class="chat-input-area">
      <input type="text" id="input-{{ r.id }}" class="chat-input" placeholder="Type message...">
      <button class="send-btn" onclick="sendMsg('{{ r.category }}', {{ r.id }})">Send</button>
    </div>

  </div>

</div>
{% endfor %}

<script>
const userId = {{ user.id }};

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function formatTime(ts){
  const d = new Date(ts.replace(' ', 'T'));
  return d.toLocaleTimeString('en-IN', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  });
}

async function loadChat(type, id){
  const box = document.getElementById(`chat-${id}`);
  const res = await fetch(`/get_messages/${type}/${id}`);
  const data = await res.json();

  box.innerHTML = '';

  data.forEach(m => {
    const el = document.createElement('div');
    el.className = "message " + m.sender;

    el.innerHTML = `
      ${escapeHtml(m.message)}
      <div class="timestamp">${formatTime(m.created_at)}</div>
    `;

    box.appendChild(el);
  });

  box.scrollTop = box.scrollHeight;
}

async function sendMsg(type, id){
  const input = document.getElementById(`input-${id}`);
  const msg = input.value.trim();
  if(!msg) return;

  await fetch('/send_message', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      request_type: type,
      request_id: id,
      sender: 'user',
      sender_id: userId,
      message: msg
    })
  });

  input.value = '';
  loadChat(type, id);
}

/* TOGGLE FUNCTION */
function toggleChat(id){
  const area = document.getElementById(`chat-area-${id}`);
  const btn = area.parentElement.querySelector('.toggle-btn');

  if(area.style.display === "none" || area.style.display === ""){
    area.style.display = "block";
    btn.innerText = "Hide Chat";
  } else {
    area.style.display = "none";
    btn.innerText = "Show Chat";
  }
}

/* AUTO REFRESH (same logic, no change) */
setInterval(() => {
  document.querySelectorAll('.request-card').forEach(card => {
    const id = card.dataset.id;
    const type = card.dataset.type;
    loadChat(type, id);
  });
}, 3000);

/* INITIAL LOAD */
document.querySelectorAll('.request-card').forEach(card => {
  loadChat(card.dataset.type, card.dataset.id);
});
</script>

</body>
</html>
