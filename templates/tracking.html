<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ role }} Tracking – Issue #{{ item.id }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, #f9f9f9, #fffffffb);
    padding: 30px 11%;
}

/* MAP */
#map {
    height: 450px;
    border-radius: 14px;
}

/* CHAT */
.chat-box {
    height: 260px;
    overflow-y: auto;
    background: #f9fafb;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.message {
    max-width: 70%;
    padding: 8px 12px;
    margin: 6px 0;
    border-radius: 12px;
    font-size: 0.9rem;
}

.admin {
    background: #4f46e5;
    color: white;
    margin-left: auto;
}

.user {
    background: #e5e7eb;
}

.timestamp {
    font-size: 10px;
    margin-top: 3px;
    opacity: 0.7;
}

.chat-input {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

.chat-input input {
    flex: 1;
    padding: 8px;
}

.chat-input button {
    background: #dc2626;
    color: white;
    border: none;
    padding: 8px 12px;
}

/* TRACKING LABEL */
.tracking-label {
    margin: 10px 0;
    font-weight: 600;
}
.live { color: red; }
.static { color: green; }
</style>
</head>

<body>

<h2>{{ role }} Tracking – Issue #{{ item.id }}</h2>

<!-- TRACK MODE LABEL -->
<div class="tracking-label">
📍 Tracking Mode:
{% if 'women' in (item.issue_type or item.emergency_type)|lower %}
    <span class="live">LIVE (Women Safety)</span>
{% else %}
    <span class="static">STATIC</span>
{% endif %}
</div>

<div id="map"></div>

<hr>
<h3>💬 Live Chat</h3>

<div id="messages" class="chat-box"></div>

<div class="chat-input">
    <input type="text" id="msg" placeholder="Type message...">
    <button id="sendBtn">Send</button>
</div>

<!-- MAP -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script>

let userLat={{ item.lat or 18.5204 }};
let userLon={{ item.lon or 73.8567 }};

let adminLat=userLat;
let adminLon=userLon;

const isWomenSafety=
"{{ item.issue_type or item.emergency_type }}"
.toLowerCase()
.includes("women");


const map=L.map('map').setView(
[userLat,userLon],
16
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);


const userMarker=L.marker(
[userLat,userLon]
)
.addTo(map)
.bindPopup("Citizen");


const adminMarker=L.marker(
[adminLat,adminLon]
)
.addTo(map)
.bindPopup("Admin");


let routeControl=L.Routing.control({
waypoints:[
L.latLng(adminLat,adminLon),
L.latLng(userLat,userLon)
],
addWaypoints:false,
draggableWaypoints:false
}).addTo(map);



/* HIGH ACCURACY ADMIN GPS */

if(navigator.geolocation){

navigator.geolocation.watchPosition(

function(pos){

adminLat=pos.coords.latitude;
adminLon=pos.coords.longitude;

adminMarker.setLatLng([
adminLat,
adminLon
]);

routeControl.setWaypoints([
L.latLng(adminLat,adminLon),
L.latLng(userLat,userLon)
]);

},

function(err){
console.log(err);
},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}



/* USER LIVE TRACKING */

if(isWomenSafety){

setInterval(()=>{

fetch('/get_user_location/{{ item.user_id }}')

.then(r=>r.json())

.then(loc=>{

if(loc.lat && loc.lon){

userLat=parseFloat(loc.lat);
userLon=parseFloat(loc.lon);

userMarker.setLatLng([
userLat,
userLon
]);

routeControl.setWaypoints([
L.latLng(adminLat,adminLon),
L.latLng(userLat,userLon)
]);

}

})

},3000)

}

</script>

<!-- CHAT -->
<script>

const requestType="{{request_type}}";
const requestId={{request_id}};
const adminId={{admin.id}};


async function loadMessages(){

const box=document.getElementById("messages");

try{

const res=await fetch(
`/get_messages/${requestType}/${requestId}`
);

const data=await res.json();

box.innerHTML="";

data.forEach(m=>{

const div=document.createElement("div");

div.className=
"message "+
(m.sender==="admin"
? "admin"
: "user");

div.innerHTML=`
${m.message}
<div class="timestamp">
${m.created_at}
</div>
`;

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

}
catch(err){
console.log(err);
}

}



async function sendMessage(){

const input=
document.getElementById("msg");

const text=
input.value.trim();

if(!text)return;

try{

await fetch("/send_message",{

method:"POST",

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

request_type:requestType,
request_id:requestId,
sender:"admin",
sender_id:adminId,
message:text

})

});

input.value="";

loadMessages();

}
catch(err){
console.log(err);
}

}


document
.getElementById("sendBtn")
.onclick=sendMessage;


document
.getElementById("msg")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){

sendMessage();

}

});


loadMessages();

setInterval(loadMessages,2000);

</script>

</body>
</html>
